services:
  - type: web
    name: retail-agent-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ODOO_URL
        sync: false
      - key: ODOO_DB
        sync: false
      - key: ODOO_USERNAME
        sync: false
      - key: ODOO_API_KEY
        sync: false
      - key: APP_AUTH_TOKEN
        sync: false
      - key: WHATSAPP_ALLOWED_NUMBERS
        sync: false
      - key: WHATSAPP_RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: PUBLIC_WHATSAPP_WEBHOOK_URL
        sync: false
      - key: APP_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_MODEL_ENDPOINT
        sync: false

  - type: web
    name: retail-agent-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
